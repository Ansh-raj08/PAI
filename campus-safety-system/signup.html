<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Safety System - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="page-bg-orb orb-a" aria-hidden="true"></div>
    <div class="page-bg-orb orb-b" aria-hidden="true"></div>

    <header class="site-header">
        <div class="container nav-wrap">
            <a href="index.html" class="brand" aria-label="Campus Safety Home">
                <span class="brand-dot" aria-hidden="true"></span>
                <span>Campus Safety</span>
            </a>
            <nav class="main-nav" aria-label="Primary">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <main style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
        <div class="container" style="max-width: 520px;">
            <div class="feature-card" style="padding: 2rem;">
                <h1 style="margin-bottom: 0.5rem; font-size: 1.8rem; text-align: center;">Sign Up</h1>
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">
                    Create your Campus Safety account
                </p>

                <form id="signupForm" style="display: grid; gap: 1rem;">
                    <div style="display: grid; gap: 0.4rem;">
                        <label for="full_name" style="font-weight: 600; font-size: 0.92rem;">Full Name *</label>
                        <input
                            type="text"
                            id="full_name"
                            name="full_name"
                            required
                            placeholder="John Doe"
                            style="
                                padding: 0.75rem 1rem;
                                border: 1px solid var(--line);
                                border-radius: var(--radius-sm);
                                background: linear-gradient(145deg, #ffffff, #f9fafb);
                                box-shadow: var(--shadow-inset);
                                font-family: inherit;
                                font-size: 1rem;
                                transition: border-color var(--transition), box-shadow var(--transition);
                            "
                        />
                    </div>

                    <div style="display: grid; gap: 0.4rem;">
                        <label for="roll_number" style="font-weight: 600; font-size: 0.92rem;">Roll Number *</label>
                        <input
                            type="text"
                            id="roll_number"
                            name="roll_number"
                            required
                            placeholder="2024CS001"
                            style="
                                padding: 0.75rem 1rem;
                                border: 1px solid var(--line);
                                border-radius: var(--radius-sm);
                                background: linear-gradient(145deg, #ffffff, #f9fafb);
                                box-shadow: var(--shadow-inset);
                                font-family: inherit;
                                font-size: 1rem;
                                transition: border-color var(--transition), box-shadow var(--transition);
                            "
                        />
                    </div>

                    <div style="display: grid; gap: 0.4rem;">
                        <label for="signup_email" style="font-weight: 600; font-size: 0.92rem;">Email *</label>
                        <input
                            type="email"
                            id="signup_email"
                            name="email"
                            required
                            placeholder="student@krmu.edu.in"
                            style="
                                padding: 0.75rem 1rem;
                                border: 1px solid var(--line);
                                border-radius: var(--radius-sm);
                                background: linear-gradient(145deg, #ffffff, #f9fafb);
                                box-shadow: var(--shadow-inset);
                                font-family: inherit;
                                font-size: 1rem;
                                transition: border-color var(--transition), box-shadow var(--transition);
                            "
                        />
                    </div>

                    <div style="display: grid; gap: 0.4rem;">
                        <label for="phone" style="font-weight: 600; font-size: 0.92rem;">Phone (Optional)</label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+1 234 567 8900"
                            style="
                                padding: 0.75rem 1rem;
                                border: 1px solid var(--line);
                                border-radius: var(--radius-sm);
                                background: linear-gradient(145deg, #ffffff, #f9fafb);
                                box-shadow: var(--shadow-inset);
                                font-family: inherit;
                                font-size: 1rem;
                                transition: border-color var(--transition), box-shadow var(--transition);
                            "
                        />
                    </div>

                    <div style="display: grid; gap: 0.4rem;">
                        <label for="signup_password" style="font-weight: 600; font-size: 0.92rem;">Password *</label>
                        <input
                            type="password"
                            id="signup_password"
                            name="password"
                            required
                            placeholder="Create a strong password"
                            style="
                                padding: 0.75rem 1rem;
                                border: 1px solid var(--line);
                                border-radius: var(--radius-sm);
                                background: linear-gradient(145deg, #ffffff, #f9fafb);
                                box-shadow: var(--shadow-inset);
                                font-family: inherit;
                                font-size: 1rem;
                                transition: border-color var(--transition), box-shadow var(--transition);
                            "
                        />
                    </div>

                    <div
                        id="messageBox"
                        role="alert"
                        style="
                            display: none;
                            padding: 0.75rem 1rem;
                            border-radius: var(--radius-sm);
                            font-size: 0.9rem;
                        "
                    ></div>

                    <button
                        type="submit"
                        id="submitBtn"
                        class="btn btn-primary"
                        style="
                            width: 100%;
                            margin-top: 0.5rem;
                            cursor: pointer;
                            border: none;
                            font-size: 1rem;
                        "
                    >
                        Sign Up
                    </button>

                    <p style="text-align: center; color: var(--text-muted); font-size: 0.92rem; margin-top: 0.5rem;">
                        Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
