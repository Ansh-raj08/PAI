<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #3ecf8e; }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
        }
        .success { background: rgba(62, 207, 142, 0.2); border: 1px solid #3ecf8e; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
        .info { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; }
        pre {
            background: #0d0d1a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        button {
            background: #3ecf8e;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }
        button:hover { background: #2eb87a; }
    </style>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <p>Open browser console (F12) to see detailed logs.</p>

    <div id="status" class="status info">
        Initializing Supabase client...
    </div>

    <div id="details"></div>

    <button onclick="runTest()">Run Connection Test</button>

    <script type="module">
        import { supabase, testConnection } from './js/supabase-config.js';

        // Make functions available globally for button click
        window.runTest = runTest;

        const statusEl = document.getElementById('status');
        const detailsEl = document.getElementById('details');

        // Auto-run test on load
        document.addEventListener('DOMContentLoaded', () => {
            runTest();
        });

        async function runTest() {
            statusEl.textContent = 'Testing connection...';
            statusEl.className = 'status info';
            detailsEl.innerHTML = '';

            const result = await testConnection();

            if (result.success) {
                statusEl.textContent = '✅ Supabase connected successfully!';
                statusEl.className = 'status success';

                detailsEl.innerHTML = `
                    <h3>Connection Details:</h3>
                    <pre>${JSON.stringify({
                        connected: true,
                        hasActiveSession: !!result.user,
                        user: result.user ? {
                            id: result.user.id,
                            email: result.user.email
                        } : null
                    }, null, 2)}</pre>
                `;
            } else {
                statusEl.textContent = '❌ Connection failed: ' + result.error;
                statusEl.className = 'status error';
            }

            // Additional test: Try to query (will fail without tables, but tests API)
            console.log('[Test] Attempting table query...');
            const { data, error } = await supabase.from('profiles').select('count').limit(1);

            if (error) {
                console.log('[Test] Table query result:', error.message);
                // This is expected if tables don't exist yet
                if (error.message.includes('does not exist')) {
                    detailsEl.innerHTML += `
                        <div class="status info" style="margin-top: 15px;">
                            ⓘ Note: Tables not created yet. Run the SQL schema from SUPABASE_MIGRATION_PLAN.md
                        </div>
                    `;
                }
            } else {
                console.log('[Test] Table query successful:', data);
                detailsEl.innerHTML += `
                    <div class="status success" style="margin-top: 15px;">
                        ✅ Database tables accessible
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
